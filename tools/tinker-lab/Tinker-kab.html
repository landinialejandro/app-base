<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinker Lab</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 20px
        }

        h1 {
            margin-top: 0
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        .card {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 16px
        }

        .full {
            grid-column: 1/-1
        }

        textarea,
        input {
            width: 100%;
            background: #0b1220;
            color: #e5e7eb;
            border: 1px solid #4b5563;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box
        }

        textarea {
            min-height: 220px
        }

        button {
            background: #2563eb;
            color: white;
            border: 0;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 8px
        }

        .muted {
            color: #9ca3af;
            font-size: 12px
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #0b1220;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #374151
        }
    </style>
</head>

<body>
    <h1>Tinker Lab</h1>
    <p class="muted">Herramienta local para preparar comandos, registrar salidas y generar logs para ChatGPT.</p>
    <div class="grid">
        <div class="card">
            <h3>Código Tinker</h3><textarea id="code"></textarea><button onclick="generate()">Generar
                comando</button><button onclick="copyText('cmd')">Copiar comando</button>
        </div>
        <div class="card">
            <h3>Comando generado</h3><textarea id="cmd"></textarea>
        </div>
        <div class="card">
            <h3>Salida consola</h3><textarea id="output"></textarea><button onclick="buildLog()">Generar
                log</button><button onclick="copyText('log')">Copiar log</button>
        </div>
        <div class="card">
            <h3>Datos</h3><input id="case" placeholder="Caso (ej: orders-delete)"><input id="status"
                placeholder="Estado (OK / ERROR / REVISAR)" style="margin-top:8px">
        </div>
        <div class="card full">
            <h3>Log final</h3><textarea id="log" style="min-height:320px"></textarea>
        </div>
    </div>
    <script>
        function esc(s) { return s.replace(/'/g, "'\\''"); }
        function generate() { const code = document.getElementById('code').value.trim(); document.getElementById('cmd').value = "php artisan tinker --execute='\n" + esc(code) + "\n'"; }
        function buildLog() { const c = document.getElementById('case').value || 'sin-caso'; const st = document.getElementById('status').value || 'PENDIENTE'; const out = document.getElementById('output').value; const now = new Date().toLocaleString(); document.getElementById('log').value = '============================================================\nTINKER LAB LOG\n============================================================\nFECHA: ' + now + '\nCASO: ' + c + '\nESTADO: ' + st + '\n============================================================\n\nSALIDA:\n' + out + '\n\n============================================================\nFIN\n============================================================'; }
        function copyText(id) { const el = document.getElementById(id); el.select(); document.execCommand('copy'); }
    </script>
</body>

</html>
